name: 每日新闻摘要

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install feedparser deep-translator
      - name: Validate Python syntax
        run: python3 -m py_compile daily_news.py
      - name: Fetch and push news
        env:
          WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
        run: python3 daily_news.py "$WEBHOOK_URL"
